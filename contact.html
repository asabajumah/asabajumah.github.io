<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact – Asaba Jumah</title>

<style>

/* BODY */
body {
  margin:0;
  padding-top:70px;
  font-family:Arial;
  background:#020617;
  color:white;
}

/* NAVBAR */
.navbar {
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:15px 20px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

.logo {
  font-weight:bold;
  font-size:18px;
}

/* NAV LINKS */
.nav-links {
  display:flex;
}

.nav-links a {
  color:white;
  text-decoration:none;
  margin-left:20px;
}

/* HAMBURGER */
.menu-toggle {
  display:none;
  font-size:24px;
  cursor:pointer;
}

/* MOBILE */
@media (max-width:768px){

  .menu-toggle {
    display:block;
  }

  .nav-links {
    display:none;
    flex-direction:column;
    width:100%;
    position:absolute;
    top:60px;
    left:0;
    background:#020617;
    padding:10px 0;
  }

  .nav-links a {
    margin:10px 0;
    text-align:center;
  }

  .nav-links.active {
    display:flex;
  }
}

/* CONTENT */
.container {
  max-width:800px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

.card {
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  margin-bottom:20px;
}

a {
  color:#38bdf8;
  text-decoration:none;
}

footer {
  text-align:center;
  padding:20px;
  color:#94a3b8;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Asaba Jumah</div>

  <!-- ☰ -->
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="/">Home</a>
    <a href="/films">Films</a>
    <a href="/contact">Contact</a>
  </div>
</div>

<div class="container">

<div class="card">
<h2>Contact</h2>
<p>Email for bookings:</p>
<p>
<a href="mailto:asabajumahfelix@gmail.com">
asabajumahfelix@gmail.com
</a>
</p>
</div>

<div class="card">
<h2>Social Profiles</h2>

<a href="https://www.facebook.com/djfelixpro">Facebook</a><br><br>
<a href="https://www.instagram.com/djfelixpro">Instagram</a><br><br>
<a href="https://x.com/asabajumah">X (Twitter)</a><br><br>
<a href="https://www.tiktok.com/@asabajumah">TikTok</a><br><br>
<a href="https://www.youtube.com/@asabajumah">YouTube</a>

</div>

</div>

<footer>
© 2026 Asaba Jumah
</footer>

<!-- SCRIPT -->
<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
