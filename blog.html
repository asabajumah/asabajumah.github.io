<div class="container">

<div id="blogContainer" class="grid"></div>

</div>

<script>
fetch("blog-data.json")
.then(res => res.json())
.then(data => {
  let container = document.getElementById("blogContainer");

  data.forEach(post => {
    container.innerHTML += `
      <div class="card">
        <h3>${post.title}</h3>
        <p>${post.text}</p>
        <a href="${post.link}">Read More →</a>
      </div>
    `;
  });
});
</script>
