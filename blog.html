<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog – Asaba Jumah</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  padding-top:60px;
  font-family:Arial;
  background:#020617;
  color:white;

  /* ✅ DISABLE SELECT */
  -webkit-user-select:none;
  -ms-user-select:none;
  user-select:none;
}

/* NAVBAR */
.navbar {
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:15px;
  background:#020617;
  border-bottom:1px solid #1e293b;
  z-index:1000;
}

.navbar a {color:white;text-decoration:none;}
.navbar a:hover {color:#38bdf8;}

/* HERO */
.hero {
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(to bottom,#020617,#0f172a);
}

.hero h1 {margin:0;font-size:40px;}
.hero p {color:#94a3b8;}

/* CONTAINER */
.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:#1e293b;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #1e293b;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
  border-color:#38bdf8;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content {padding:15px;}

.card h3 {
  margin:0;
  color:#38bdf8;
  font-size:18px;
}

.card p {
  color:#cbd5e1;
  font-size:14px;
  margin-top:8px;
  line-height:1.5;
}

.readmore {
  display:inline-block;
  margin-top:10px;
  color:#38bdf8;
  text-decoration:none;
  font-weight:bold;
}

.readmore:hover {text-decoration:underline;}

/* SOCIAL */
.section {
  margin-top:50px;
  text-align:center;
}

.social-icons a {
  display:inline-block;
  margin:10px;
  font-size:24px;
  color:#38bdf8;
}

footer {
  text-align:center;
  padding:20px;
  color:#94a3b8;
}

/* 🔒 PROTECTED MESSAGE */
#protectedMsg {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:red;
  color:white;
  padding:10px 18px;
  border-radius:8px;
  font-weight:bold;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="films.html">Films</a>
<a href="blog.html">Blog</a>
<a href="contact.html">Contact</a>
</div>

<!-- HERO -->
<div class="hero">
<h1>Blog</h1>
<p>Latest updates, news & stories</p>
</div>

<!-- BLOG -->
<div class="container">
  <div id="blogContainer" class="grid"></div>
</div>

<script>
fetch("blog-data.json")
.then(res => res.json())
.then(data => {

  let container = document.getElementById("blogContainer");
  container.innerHTML = "";

  data.forEach((post, index) => {
    container.innerHTML += `
      <div class="card">
        ${post.image ? `<img src="${post.image}" alt="Blog Image">` : ""}
        <div class="card-content">
          <h3>${post.title}</h3>
          <p>${post.text.substring(0,120)}...</p>
          <a class="readmore" href="post.html?id=${index}">
            Read More →
          </a>
        </div>
      </div>
    `;
  });

});
</script>

<!-- PROFILES -->
<div class="section">
<h2>Official Profiles</h2>

<div class="social-icons">
<a href="https://www.facebook.com/djfelixpro"><i class="fab fa-facebook"></i></a>
<a href="https://x.com/asabajumah"><i class="fab fa-x-twitter"></i></a>
<a href="https://www.tiktok.com/@asabajumah"><i class="fab fa-tiktok"></i></a>
<a href="https://www.instagram.com/djfelixpro"><i class="fab fa-instagram"></i></a>
<a href="https://www.youtube.com/@asabajumah"><i class="fab fa-youtube"></i></a>
<a href="https://www.imdb.com/name/nm18243050/"><i class="fab fa-imdb"></i></a>
<a href="https://www.themoviedb.org/person/6077619-asaba-jumah"><i class="fas fa-film"></i></a>
</div>
</div>

<footer>© 2026 Asaba Jumah</footer>

<!-- 🔒 MESSAGE -->
<div id="protectedMsg">Protected 🔒</div>

<script>
function showProtected() {
  let msg = document.getElementById("protectedMsg");
  msg.style.display = "block";
  setTimeout(() => { msg.style.display = "none"; }, 1500);
}

/* BLOCK ACTIONS */
document.addEventListener("copy", function(e){
  e.preventDefault();
  showProtected();
});

document.addEventListener("contextmenu", function(e){
  e.preventDefault();
  showProtected();
});

document.addEventListener("keydown", function(e){
  if (e.ctrlKey && (e.key === "c" || e.key === "u" || e.key === "s")) {
    e.preventDefault();
    showProtected();
  }
});
</script>

</body>
</html>
