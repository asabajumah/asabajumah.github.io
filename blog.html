<div class="container">
<div id="blogContainer" class="grid"></div>
</div>

<script>
fetch("blog-data.json")
.then(res => res.json())
.then(data => {
  let container = document.getElementById("blogContainer");

  data.forEach(post => {
    container.innerHTML += `
      <div class="card">
        ${post.image ? `<img src="${post.image}" style="width:100%;border-radius:10px;margin-bottom:10px;">` : ""}
        <h3>${post.title}</h3>
        <p>${post.text}</p>
      </div>
    `;
  });
});
</script>
