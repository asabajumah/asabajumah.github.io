<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog Post – Asaba Jumah</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  padding-top:60px;
  font-family:Arial;
  background:#020617;
  color:white;

  /* 🔒 DISABLE SELECT */
  -webkit-user-select:none;
  -ms-user-select:none;
  user-select:none;
}

/* NAVBAR */
.navbar {
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:15px;
  background:#020617;
  border-bottom:1px solid #1e293b;
  z-index:1000;
}

.navbar a {color:white;text-decoration:none;}
.navbar a:hover {color:#38bdf8;}

/* CONTAINER */
.container {
  max-width:800px;
  margin:auto;
  padding:20px;
}

/* POST CARD */
.post-card {
  background:#1e293b;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #1e293b;
}

/* IMAGE */
.post-card img {
  width:100%;
  height:300px;
  object-fit:cover;
}

/* CONTENT */
.post-content {padding:20px;}

.post-content h1 {
  color:#38bdf8;
  margin-top:0;
}

.post-content p {
  color:#cbd5e1;
  line-height:1.7;
}

/* BACK */
.back {
  display:inline-block;
  margin-top:20px;
  color:#38bdf8;
  text-decoration:none;
}

.back:hover {text-decoration:underline;}

/* PROFILES */
.section {
  margin-top:40px;
  text-align:center;
}

.social-icons a {
  display:inline-block;
  margin:10px;
  font-size:24px;
  color:#38bdf8;
}

.social-icons a:hover {
  color:white;
  transform:scale(1.2);
}

/* 🔒 POPUP */
#protectedMsg {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:red;
  color:white;
  padding:10px 18px;
  border-radius:8px;
  font-weight:bold;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<a href="index.html">Home</a>
<a href="blog.html">Blog</a>
<a href="about.html">About</a>
</div>

<!-- POST -->
<div class="container" id="post"></div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch("blog-data.json")
.then(res => res.json())
.then(data => {

  let post = data[id];

  if(!post){
    document.getElementById("post").innerHTML = "<h2>Post not found</h2>";
    return;
  }

  document.getElementById("post").innerHTML = `
    <div class="post-card">

      ${post.image ? `<img src="${post.image}" alt="Blog Image">` : ""}

      <div class="post-content">
        <h1>${post.title}</h1>
        <p>${post.text}</p>

        <a class="back" href="blog.html">← Back to Blog</a>
      </div>
    </div>

    <div class="section">
      <h2>Official Profiles</h2>

      <div class="social-icons">
        <a href="https://www.facebook.com/djfelixpro"><i class="fab fa-facebook"></i></a>
        <a href="https://x.com/asabajumah"><i class="fab fa-x-twitter"></i></a>
        <a href="https://www.tiktok.com/@asabajumah"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.instagram.com/djfelixpro"><i class="fab fa-instagram"></i></a>
        <a href="https://www.youtube.com/@asabajumah"><i class="fab fa-youtube"></i></a>
        <a href="https://www.imdb.com/name/nm18243050/"><i class="fab fa-imdb"></i></a>
        <a href="https://www.themoviedb.org/person/6077619-asaba-jumah"><i class="fas fa-film"></i></a>
      </div>
    </div>
  `;

  // BLOG SCHEMA
  let schema = {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": post.title,
    "description": post.text,
    "image": post.image || "https://asabajumah.top/favicon.ico",
    "author": {
      "@type": "Person",
      "name": "Asaba Jumah"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Asaba Jumah",
      "logo": {
        "@type": "ImageObject",
        "url": "https://asabajumah.top/favicon.ico"
      }
    },
    "mainEntityOfPage": window.location.href
  };

  let script = document.createElement("script");
  script.type = "application/ld+json";
  script.text = JSON.stringify(schema);
  document.head.appendChild(script);
});
</script>

<!-- 🔒 MESSAGE -->
<div id="protectedMsg">Protected 🔒</div>

<script>
function showProtected(){
  let msg=document.getElementById("protectedMsg");
  msg.style.display="block";
  setTimeout(()=>{msg.style.display="none";},1500);
}

document.addEventListener("copy",e=>{e.preventDefault();showProtected();});
document.addEventListener("contextmenu",e=>{e.preventDefault();showProtected();});
document.addEventListener("keydown",e=>{
  if(e.ctrlKey&&(e.key==="c"||e.key==="u"||e.key==="s")){
    e.preventDefault();
    showProtected();
  }
});
</script>

</body>
</html>
