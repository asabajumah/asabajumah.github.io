<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 400px;
    }

    h1 {
      font-size: 60px;
      margin: 0;
      color: #ffcc00;
    }

    p {
      margin-top: 10px;
      color: #ccc;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #ffcc00;
      color: black;
      text-decoration: none;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>404</h1>
  <p>Oops! Page not found.</p>

  <a href="/">Go Back Home</a>
</div>

</body>
</html>
