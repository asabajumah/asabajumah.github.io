<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login – Asaba Jumah</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

.center {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.box {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#38bdf8;
  border:none;
  font-weight:bold;
  cursor:pointer;
  color:#020617;
}

#adminPanel {
  display:none;
  padding:20px;
}

.post-box {
  max-width:600px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div class="center" id="loginBox">
  <div class="box">
    <h2>Admin Login</h2>
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <div class="post-box">
    <h2>Create Blog Post</h2>

    <input id="title" placeholder="Post Title">
    <textarea id="text" placeholder="Post Content"></textarea>
    <input type="file" id="imageInput">

    <button onclick="addPost()">Add Post</button>
    <button onclick="downloadJSON()">Download JSON</button>

    <div id="posts"></div>
  </div>

</div>

<script>
const PASSWORD = "12345"; // CHANGE THIS

function login(){
  let pass = document.getElementById("password").value;

  if(pass === PASSWORD){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    document.getElementById("error").innerText = "Wrong password!";
  }
}

// BLOG SYSTEM
let posts = JSON.parse(localStorage.getItem("blogPosts")) || [];

function toBase64(file){
  return new Promise((resolve)=>{
    let reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=>resolve(reader.result);
  });
}

async function addPost(){
  let title = document.getElementById("title").value;
  let text = document.getElementById("text").value;
  let imageFile = document.getElementById("imageInput").files[0];

  let image = "";
  if(imageFile){
    image = await toBase64(imageFile);
  }

  posts.unshift({title,text,image});
  localStorage.setItem("blogPosts", JSON.stringify(posts));

  render();
}

function render(){
  let box = document.getElementById("posts");
  box.innerHTML = "";

  posts.forEach(p=>{
    box.innerHTML += `
      <div style="margin-top:10px;background:#0f172a;padding:10px;border-radius:8px;">
        <b>${p.title}</b><br>
        ${p.text}
        ${p.image ? `<img src="${p.image}" style="width:100%;margin-top:10px;border-radius:8px;">` : ""}
      </div>
    `;
  });
}

function downloadJSON(){
  let data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(posts,null,2));
  let a = document.createElement("a");
  a.href = data;
  a.download = "blog-data.json";
  a.click();
}

render();
</script>

</body>
</html>
