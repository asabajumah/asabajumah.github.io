<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blog Admin – Asaba Jumah</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background:#020617;
  color:white;
  margin:0;
  padding:20px;
}

.container {
  max-width:600px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

input, textarea {
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:5px;
}

button {
  background:#38bdf8;
  border:none;
  padding:10px;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
  margin-top:5px;
  width:100%;
}

.post {
  background:#0f172a;
  padding:10px;
  margin-top:10px;
  border-radius:5px;
}

img {
  width:100%;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Blog Admin Panel</h2>

<input id="title" placeholder="Post Title">
<textarea id="text" placeholder="Post Content"></textarea>

<input type="file" id="imageInput" accept="image/*">

<button onclick="addPost()">Add Post</button>
<button onclick="downloadJSON()">Download JSON</button>

<h3>Saved Posts</h3>
<div id="posts"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("blogPosts")) || [];

// Convert image to Base64
function toBase64(file) {
  return new Promise((resolve, reject) => {
    let reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

async function addPost(){
  let title = document.getElementById("title").value;
  let text = document.getElementById("text").value;
  let imageFile = document.getElementById("imageInput").files[0];

  let imageData = "";
  if(imageFile){
    imageData = await toBase64(imageFile);
  }

  posts.unshift({title,text,image:imageData});

  localStorage.setItem("blogPosts", JSON.stringify(posts));

  renderPosts();
}

function renderPosts(){
  let box = document.getElementById("posts");
  box.innerHTML = "";

  posts.forEach(p=>{
    box.innerHTML += `
      <div class="post">
        <b>${p.title}</b><br>
        ${p.text}
        ${p.image ? `<img src="${p.image}">` : ""}
      </div>
    `;
  });
}

function downloadJSON(){
  let data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(posts,null,2));
  let a = document.createElement("a");
  a.href = data;
  a.download = "blog-data.json";
  a.click();
}

renderPosts();
</script>

</body>
</html>
